org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
kotlin.daemon.jvm.options=-Xmx2048m -Xms512m
# Kotlin incremental compilation is disabled because this project is on drive F:
# but the Kotlin incremental cache lives on drive C: (Pub cache).
# Kotlin cannot compute relative paths between different Windows drives —
# causing "this and base files have different roots" storage crashes.
kotlin.incremental=false
# Disable Gradle VFS watching — prevents stale incremental state after flutter clean
org.gradle.vfs.watch=false
# Disable incremental resource merging — prevents NoSuchFileException on merged.dir files
android.enableIncrementalMergeResourceTask=false
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
